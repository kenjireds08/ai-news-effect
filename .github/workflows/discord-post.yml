name: Discord Post (新着記事の自動投稿)

# discord-snippets/*.txt が新規追加されたら、Discord Webhook で自動投稿する。
# 既存ファイルの編集は無視（再投稿防止）。
#
# 現状（2026-05-13 / スクール開始前）:
#   - discord-snippets/*.txt（直下）→ DISCORD_AI_NEWS_WEBHOOK_URL
#     ↑ 実態は「ちーけん個人サーバーの確認用チャンネル」。
#       ちーけんが内容確認 → 必要なら未来AI学院に手動で転送する運用。
#
# 将来（未来AI学院 Webhook 設定後・スクール開始後を想定）:
#   - discord-snippets/staging/*.txt → DISCORD_AI_NEWS_TEST_WEBHOOK_URL（ちーけん個人）
#   - discord-snippets/*.txt（直下） → DISCORD_AI_NEWS_WEBHOOK_URL（未来AI学院に書き換え）
#
# 必要な GitHub Secrets:
#   - DISCORD_AI_NEWS_WEBHOOK_URL:      現状は ちーけん個人サーバー、将来は未来AI学院に切り替え
#   - DISCORD_AI_NEWS_TEST_WEBHOOK_URL: 未設定。スクール開始後に追加予定（staging 切替時に必要）

on:
  push:
    branches: [main]
    paths:
      - 'discord-snippets/**.txt'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 直前のコミットと比較するため

      - name: Detect newly added snippets
        id: changes
        run: |
          set -e
          # 直前のコミットと比較して「新規追加(A)」された discord-snippets/ 配下の .txt を抽出
          # 既存ファイルの編集(M)は無視（再投稿防止）
          # staging/ サブディレクトリも含む
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD \
            | grep -E '^discord-snippets/(staging/)?[^/]+\.txt$' || true)
          if [ -z "$NEW_FILES" ]; then
            echo "新規スニペットなし（編集のみ or push 内容に該当なし）"
          else
            echo "新規スニペット検出:"
            echo "$NEW_FILES"
          fi
          {
            echo "files<<EOF"
            echo "$NEW_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Cloudflare Pages のデプロイ完了を待つ（OG画像が間に合うように）
      # 2026-05-14 事故: push 直後に Discord 投稿したら og:image がまだ 404 で、
      # Discord が「画像なし」状態でキャッシュしてしまい、後から修正不可になった。
      # 90 秒待てば Cloudflare Pages のデプロイは通常完了する。
      - name: Wait for Cloudflare Pages deployment
        if: steps.changes.outputs.files != ''
        run: |
          echo "⏳ Cloudflare Pages のデプロイ完了を待機（90秒）..."
          sleep 90
          echo "✅ 待機完了"

      # snippet 内の HTML URL と og:image URL の到達性を確認（best effort）
      # 投稿前に 404 を検出できれば、Discord キャッシュ事故を未然に防げる
      - name: Verify HTML and og:image are reachable
        if: steps.changes.outputs.files != ''
        run: |
          set +e  # 検証失敗で workflow 全体を落とさない（warning にとどめる）
          IFS=$'\n'
          for file in ${{ steps.changes.outputs.files }}; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            HTML_URL=$(grep -oE 'https://ai-news-effect\.pages\.dev/[^ )]+\.html[^ )]*' "$file" | head -1)
            if [ -z "$HTML_URL" ]; then
              echo "ℹ️  $file: HTML URL なし（OG 検証スキップ）"
              continue
            fi

            HTML_STATUS=$(curl -sLI "$HTML_URL" -o /dev/null -w "%{http_code}")
            echo "📄 HTML $HTML_STATUS: $HTML_URL"
            if [ "$HTML_STATUS" != "200" ]; then
              echo "   ⚠️  HTML が 200 を返しません。Discord プレビューに影響する可能性。"
            fi

            # og:image URL を HTML から抽出して 200 確認
            OG_URL=$(curl -sL "$HTML_URL" \
              | grep -oE 'property="og:image"[[:space:]]+content="[^"]+"' \
              | head -1 \
              | sed 's/.*content="\([^"]*\)".*/\1/')
            if [ -n "$OG_URL" ]; then
              OG_STATUS=$(curl -sLI "$OG_URL" -o /dev/null -w "%{http_code}")
              if [ "$OG_STATUS" = "200" ]; then
                echo "🖼️  og:image OK ($OG_STATUS): $OG_URL"
              else
                echo "   ⚠️  og:image $OG_STATUS: $OG_URL"
                echo "      Discord プレビューが「画像なし」または旧画像になる可能性。"
                echo "      Cloudflare Pages のデプロイ完了を確認後、別 URL（?v=N）で再投稿を検討。"
              fi
            else
              echo "   ⚠️  og:image メタタグが HTML に見つかりません: $HTML_URL"
            fi
          done
          set -e

      - name: Post each snippet to Discord
        if: steps.changes.outputs.files != ''
        env:
          PROD_WEBHOOK_URL: ${{ secrets.DISCORD_AI_NEWS_WEBHOOK_URL }}
          TEST_WEBHOOK_URL: ${{ secrets.DISCORD_AI_NEWS_TEST_WEBHOOK_URL }}
        run: |
          set -e

          IFS=$'\n'
          for file in ${{ steps.changes.outputs.files }}; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && { echo "⚠️ ファイル消滅: $file"; continue; }

            # staging/ 配下なら TEST Webhook、それ以外は本番 Webhook
            # Bot 名も staging（テスト）/ 本番（AI博士）で区別する
            if [[ "$file" == discord-snippets/staging/* ]]; then
              WEBHOOK_URL="$TEST_WEBHOOK_URL"
              ENV_LABEL="🧪 TEST"
              BOT_NAME="AI博士（テスト）"
              if [ -z "$WEBHOOK_URL" ]; then
                echo "❌ DISCORD_AI_NEWS_TEST_WEBHOOK_URL が未設定です（staging 投稿に必須）。"
                exit 1
              fi
            else
              WEBHOOK_URL="$PROD_WEBHOOK_URL"
              ENV_LABEL="🚀 PROD"
              BOT_NAME="AI博士"
              if [ -z "$WEBHOOK_URL" ]; then
                echo "❌ DISCORD_AI_NEWS_WEBHOOK_URL が未設定です（本番投稿に必須）。"
                exit 1
              fi
            fi

            echo "📤 $ENV_LABEL 投稿中: $file"

            # # で始まる行（コメント）を除去 + 前後の空行を整える
            CONTENT=$(grep -v '^#' "$file" | sed -e '/./,$!d' | sed -e ':a' -e '/^\n*$/{$d;N;ba' -e '}')

            # 文字数チェック (Discord 上限 2000)
            LEN=${#CONTENT}
            if [ "$LEN" -gt 2000 ]; then
              echo "❌ $file: 2000 文字超過 ($LEN)。短縮してください。"
              exit 1
            fi
            echo "   文字数: $LEN"

            # username オーバーライド（BOT_NAME は環境分岐で設定済み）
            PAYLOAD=$(jq -n --arg content "$CONTENT" --arg username "$BOT_NAME" '{content: $content, username: $username}')

            HTTP_CODE=$(curl -sS -o /tmp/discord_response.json -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "User-Agent: ai-news-effect-action" \
              -d "$PAYLOAD" \
              "$WEBHOOK_URL?wait=true")

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              MSG_ID=$(jq -r '.id // "unknown"' /tmp/discord_response.json)
              echo "   ✅ $ENV_LABEL 投稿完了 (message_id: $MSG_ID)"
            else
              echo "   ❌ HTTP $HTTP_CODE"
              cat /tmp/discord_response.json
              exit 1
            fi

            sleep 2
          done
          echo ""
          echo "✅ 全スニペット投稿完了"
